<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Centered Form</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #000000;
        color: #ffffff;
        font-family: Arial, Helvetica, sans-serif;
      }

      .card {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        width: min(90vw, 420px);
        text-align: center;
      }

      input,
      button {
        border: none;
        border-radius: 8px;
        padding: 0.75rem;
        font-size: 1rem;
      }

      input {
        background: #ffffff;
        color: #0a0a0a;
      }

      button {
        background: #1d72ff;
        color: #ffffff;
        cursor: pointer;
      }

      button:hover {
        background: #3a86ff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Welcome</h1>
      <input type="text" placeholder="Type something..." aria-label="User input" />
      <button type="button">Submit</button>
    </main>
  </body>
</html>
